<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>WeChat | Changyi Li</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=20260317-7">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #111;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    main {
      width: min(100% - 40px, 420px);
      text-align: center;
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Times New Roman", Times, serif;
      font-size: 34px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .wechat-id {
      margin-top: 6px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .qr {
      width: min(78vw, 280px);
      height: auto;
      margin: 28px auto 24px;
      display: block;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    a {
      color: #1772d0;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      color: #f09228;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main>
    <h1>WeChat</h1>
    <p>Scan the QR code or search by WeChat ID.</p>
    <p class="wechat-id">CosmicYi</p>
    <img class="qr" src="images/wechat.png" alt="WeChat QR code for CosmicYi">
    <p><a href="index.html">Back to homepage</a></p>
  </main>
</body>

</html>
